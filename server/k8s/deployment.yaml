apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
      - name: express-app
        image: my-express-app:1.3
        imagePullPolicy: Never
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: express-app-config
        - secretRef:
            name: express-app-secret